<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planeador Semanal NEM - ACUDE</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">
  <div class="max-w-6xl mx-auto">
    <header class="bg-white rounded-3xl shadow p-6 mb-6">
      <h1 class="text-4xl font-bold text-slate-800">Planeador Semanal NEM</h1>
      <p class="text-blue-700 font-semibold mt-2">ACUDE: Centro de Capacitación y Desarrollo Integral</p>
      <p class="text-slate-600 mt-2">Genera tus planeaciones semanales basadas en la Nueva Escuela Mexicana.</p>
    </header>

    <section class="bg-white rounded-3xl shadow p-6 mb-6">
      <h2 class="text-2xl font-semibold mb-4">Datos Generales</h2>
      <div class="grid md:grid-cols-3 gap-4">
        <input id="escuela" class="border rounded-xl p-3" placeholder="Escuela" value="ACUDE: Centro de Capacitación y Desarrollo Integral">
        <input id="docente" class="border rounded-xl p-3" placeholder="Docente">
        <input id="grado" class="border rounded-xl p-3" placeholder="Grado">
        <input id="grupo" class="border rounded-xl p-3" placeholder="Grupo">
        <input id="semana" class="border rounded-xl p-3" placeholder="Semana">
        <input id="periodo" class="border rounded-xl p-3" placeholder="Periodo (ej. 12 al 16 de mayo)">
      </div>
    </section>

    <section class="bg-white rounded-3xl shadow p-6 mb-6">
      <h2 class="text-2xl font-semibold mb-4">Enfoque Pedagógico NEM</h2>
      <div class="grid md:grid-cols-2 gap-4">
        <input id="proyecto" class="border rounded-xl p-3" placeholder="Proyecto">

        <select id="campoFormativo" class="border rounded-xl p-3">
          <option value="">Campo Formativo</option>
          <option>Lenguajes</option>
          <option>Saberes y Pensamiento Científico</option>
          <option>Ética, Naturaleza y Sociedades</option>
          <option>De lo Humano y lo Comunitario</option>
        </select>

        <select id="ejeArticulador" class="border rounded-xl p-3">
          <option value="">Eje Articulador</option>
          <option>Inclusión</option>
          <option>Pensamiento Crítico</option>
          <option>Interculturalidad Crítica</option>
          <option>Igualdad de Género</option>
          <option>Vida Saludable</option>
          <option>Lectura y Escritura</option>
        </select>

        <input id="metodologia" class="border rounded-xl p-3" value="Aprendizaje Basado en Proyectos Comunitarios">

        <textarea id="contenido" class="border rounded-xl p-3 md:col-span-2" rows="3" placeholder="Contenido"></textarea>
        <textarea id="pda" class="border rounded-xl p-3 md:col-span-2" rows="3" placeholder="Proceso de Desarrollo de Aprendizaje (PDA)"></textarea>
        <textarea id="objetivo" class="border rounded-xl p-3 md:col-span-2" rows="3" placeholder="Objetivo de Aprendizaje"></textarea>
      </div>
    </section>

    <div id="dias"></div>

    <div class="flex flex-wrap gap-3 mb-6">
      <button onclick="enviarPlaneacion()" class="bg-purple-700 text-white px-5 py-3 rounded-xl">Enviar al Director</button>
      <button onclick="agregarDia()" class="bg-blue-600 text-white px-5 py-3 rounded-xl">Agregar sesión</button>
      <button onclick="guardarJSON()" class="bg-emerald-600 text-white px-5 py-3 rounded-xl">Guardar JSON</button>
      <button onclick="exportarExcel()" class="bg-green-700 text-white px-5 py-3 rounded-xl">Exportar a Excel</button>
      <button onclick="window.print()" class="bg-slate-700 text-white px-5 py-3 rounded-xl">Imprimir</button>
    </div>
  </div>

  <script>
    // URL de tu Google Apps Script (reemplaza cuando lo tengas publicado)
    const WEBHOOK_URL = 'PEGA_AQUI_TU_URL_DE_GOOGLE_APPS_SCRIPT';

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function recopilarDatos() {
      const datos = {
        escuela: document.getElementById('escuela').value,
        docente: document.getElementById('docente').value,
        grado: document.getElementById('grado').value,
        grupo: document.getElementById('grupo').value,
        semana: document.getElementById('semana').value,
        periodo: document.getElementById('periodo').value,
        proyecto: document.getElementById('proyecto').value,
        campoFormativo: document.getElementById('campoFormativo').value,
        ejeArticulador: document.getElementById('ejeArticulador').value,
        metodologia: document.getElementById('metodologia').value,
        contenido: document.getElementById('contenido').value,
        pda: document.getElementById('pda').value,
        objetivo: document.getElementById('objetivo').value,
        fechaEnvio: new Date().toLocaleString('es-MX'),
        sesiones: []
      };

      document.querySelectorAll('#dias section').forEach((section) => {
        const campos = section.querySelectorAll('input, textarea');
        datos.sesiones.push({
          dia: campos[0]?.value || '',
          inicio: campos[1]?.value || '',
          desarrollo: campos[2]?.value || '',
          cierre: campos[3]?.value || '',
          recursos: campos[4]?.value || '',
          evaluacion: campos[5]?.value || ''
        });
      });

      return datos;
    }

    async function enviarPlaneacion() {
      if (!WEBHOOK_URL || WEBHOOK_URL.includes('PEGA_AQUI')) {
        alert('Debes pegar la URL de tu Google Apps Script en la constante WEBHOOK_URL.');
        return;
      }

      const datos = recopilarDatos();

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(datos)
        });

        const texto = await response.text();
        if (!response.ok) throw new Error(texto || 'Error desconocido');

        alert('Planeación enviada correctamente.');
        console.log(texto);
      } catch (error) {
        console.error(error);
        alert('Error al enviar la planeación: ' + error.message);
      }
    }

    const nombresDias = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'];
    const contenedor = document.getElementById('dias');

    function crearDia(nombre = '') {
      const div = document.createElement('section');
      div.className = 'bg-white rounded-3xl shadow p-6 mb-6';
      div.innerHTML = `
        <h2 class="text-2xl font-semibold mb-4">${nombre || 'Sesión'}</h2>
        <div class="space-y-4">
          <input class="border rounded-xl p-3 w-full dia-nombre" placeholder="Día" value="${nombre}">
          <textarea class="border rounded-xl p-3 w-full" rows="3" placeholder="Inicio"></textarea>
          <textarea class="border rounded-xl p-3 w-full" rows="4" placeholder="Desarrollo"></textarea>
          <textarea class="border rounded-xl p-3 w-full" rows="3" placeholder="Cierre"></textarea>
          <textarea class="border rounded-xl p-3 w-full" rows="2" placeholder="Recursos y Materiales"></textarea>
          <textarea class="border rounded-xl p-3 w-full" rows="2" placeholder="Evaluación del Día"></textarea>
        </div>
      `;
      contenedor.appendChild(div);
    }

    function agregarDia() {
      crearDia('');
    }

    function guardarJSON() {

      const datos = {
        escuela: document.getElementById('escuela').value,
        docente: document.getElementById('docente').value,
        grado: document.getElementById('grado').value,
        grupo: document.getElementById('grupo').value,
        semana: document.getElementById('semana').value,
        periodo: document.getElementById('periodo').value,
        proyecto: document.getElementById('proyecto').value,
        campoFormativo: document.getElementById('campoFormativo').value,
        ejeArticulador: document.getElementById('ejeArticulador').value,
        metodologia: document.getElementById('metodologia').value,
        contenido: document.getElementById('contenido').value,
        pda: document.getElementById('pda').value,
        objetivo: document.getElementById('objetivo').value,
      };

      const blob = new Blob([JSON.stringify(datos, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'planeacion_nem.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    nombresDias.forEach(crearDia);
  </script>
  <script>
    // Exportar toda la información a Excel compatible con Microsoft Excel
    function exportarExcel() {
      const encabezados = [
        'Docente','Escuela','Grado','Grupo','Materia/Proyecto','Semana','Periodo',
        'Campo Formativo','Eje Articulador','Metodología','Contenido','PDA','Objetivo',
        'Día','Inicio','Desarrollo','Cierre','Recursos','Evaluación'
      ];

      const datos = recopilarDatos();
      const filas = [];

      if (datos.sesiones.length === 0) {
        filas.push([
          datos.docente, datos.escuela, datos.grado, datos.grupo,
          datos.proyecto, datos.semana, datos.periodo,
          datos.campoFormativo, datos.ejeArticulador, datos.metodologia,
          datos.contenido, datos.pda, datos.objetivo,
          '', '', '', '', '', ''
        ]);
      } else {
        datos.sesiones.forEach((sesion) => {
          filas.push([
            datos.docente,
            datos.escuela,
            datos.grado,
            datos.grupo,
            datos.proyecto,
            datos.semana,
            datos.periodo,
            datos.campoFormativo,
            datos.ejeArticulador,
            datos.metodologia,
            datos.contenido,
            datos.pda,
            datos.objetivo,
            sesion.dia,
            sesion.inicio,
            sesion.desarrollo,
            sesion.cierre,
            sesion.recursos,
            sesion.evaluacion
          ]);
        });
      }

      let html = `
        <html xmlns:o="urn:schemas-microsoft-com:office:office"
              xmlns:x="urn:schemas-microsoft-com:office:excel"
              xmlns="http://www.w3.org/TR/REC-html40">
        <head>
          <meta charset="UTF-8">
          <style>
            body { font-family: Calibri, Arial, sans-serif; }
            table { border-collapse: collapse; width: 100%; }
            th { background: #1d4ed8; color: white; font-weight: bold; border: 1px solid #cbd5e1; padding: 8px; }
            td { border: 1px solid #cbd5e1; padding: 6px; vertical-align: top; white-space: pre-wrap; }
            tr:nth-child(even) td { background: #f8fafc; }
          </style>
        </head>
        <body>
          <table>
            <tr>${encabezados.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr>
            ${filas.map(f => `<tr>${f.map(c => `<td>${escapeHtml(c)}</td>`).join('')}</tr>`).join('')}
          </table>
        </body>
        </html>`;

      const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Planeacion_${base.docente || 'NEM'}_${base.semana || 'Semanal'}.xls`;
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
